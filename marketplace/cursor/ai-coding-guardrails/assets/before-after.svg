<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <clipPath id="panelL"><rect x="20" y="20" width="450" height="380" rx="10"/></clipPath>
    <clipPath id="panelR"><rect x="490" y="20" width="450" height="380" rx="10"/></clipPath>
  </defs>

  <rect width="960" height="420" fill="#0d1117"/>

  <!-- LEFT PANEL: without guardrails -->
  <rect x="20" y="20" width="450" height="380" rx="10" fill="#161b22" stroke="#30363d"/>
  <g clip-path="url(#panelL)">
    <rect x="20" y="20" width="450" height="34" fill="#21262d"/>
  </g>
  <circle cx="42" cy="37" r="6" fill="#ff5f57"/>
  <circle cx="62" cy="37" r="6" fill="#febc2e"/>
  <circle cx="82" cy="37" r="6" fill="#28c840"/>
  <text x="245" y="42" text-anchor="middle" fill="#8b949e" font-size="13">without guardrails</text>

  <text x="44" y="86" fill="#8b949e" font-size="14">&gt; refactor the payment retry logic</text>

  <text x="44" y="126" fill="#e6edf3" font-size="14">Done! I've refactored the payment retry</text>
  <text x="44" y="148" fill="#e6edf3" font-size="14">logic. The code is now cleaner and more</text>
  <text x="44" y="170" fill="#e6edf3" font-size="14">maintainable. Everything should work as</text>
  <text x="44" y="192" fill="#e6edf3" font-size="14">expected. Let me know if you need</text>
  <text x="44" y="214" fill="#e6edf3" font-size="14">anything else!</text>

  <text x="44" y="262" fill="#f85149" font-size="13">✗ 14 files changed (asked for 1 module)</text>
  <text x="44" y="286" fill="#f85149" font-size="13">✗ no tests run</text>
  <text x="44" y="310" fill="#f85149" font-size="13">✗ "should work" — no evidence</text>
  <text x="44" y="334" fill="#f85149" font-size="13">✗ touches billing, no risk assessment</text>

  <!-- RIGHT PANEL: with guardrails -->
  <rect x="490" y="20" width="450" height="380" rx="10" fill="#161b22" stroke="#238636"/>
  <g clip-path="url(#panelR)">
    <rect x="490" y="20" width="450" height="34" fill="#21262d"/>
  </g>
  <circle cx="512" cy="37" r="6" fill="#ff5f57"/>
  <circle cx="532" cy="37" r="6" fill="#febc2e"/>
  <circle cx="552" cy="37" r="6" fill="#28c840"/>
  <text x="715" y="42" text-anchor="middle" fill="#7ee787" font-size="13">with guardrails</text>

  <text x="514" y="86" fill="#8b949e" font-size="14">&gt; refactor the payment retry logic</text>

  <text x="514" y="126" fill="#7ee787" font-size="14" font-weight="bold">## Result</text>
  <text x="514" y="148" fill="#e6edf3" font-size="13">Extracted retry policy into RetryPolicy;</text>
  <text x="514" y="168" fill="#e6edf3" font-size="13">behavior unchanged. 2 files, +48 −31.</text>

  <text x="514" y="200" fill="#7ee787" font-size="14" font-weight="bold">## Evidence</text>
  <text x="514" y="222" fill="#e6edf3" font-size="13">$ pytest tests/payments/ ... 34 passed</text>
  <text x="514" y="242" fill="#e6edf3" font-size="13">$ ruff check . ............ clean</text>

  <text x="514" y="274" fill="#7ee787" font-size="14" font-weight="bold">## Risk</text>
  <text x="514" y="296" fill="#e6edf3" font-size="13">High — payment path. Stopped after plan,</text>
  <text x="514" y="316" fill="#e6edf3" font-size="13">got approval before editing.</text>

  <text x="514" y="348" fill="#7ee787" font-size="14" font-weight="bold">## Assumptions</text>
  <text x="514" y="370" fill="#e6edf3" font-size="13">Retry cap of 3 kept — flagged, unverified.</text>
</svg>
